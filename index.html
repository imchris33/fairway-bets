<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Fairway Bets</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet"></div>
</div>

<!-- Scan scorecard overlay -->
<div class="scan-overlay" id="scan-overlay">
  <div class="scan-box">
    <div class="scan-icon">📷</div>
    <div class="scan-title">Scan Scorecard</div>
    <div class="scan-sub">Take a photo of the paper scorecard. Claude will read the scores and fill everything in automatically.</div>
    <img id="scan-preview" class="scan-preview" alt="Scorecard preview">
    <div id="scan-result" class="scan-result"></div>
    <div id="scan-action" style="margin-top:16px">
      <label style="display:block;width:100%;margin-bottom:10px">
        <span class="btn btn-gold" style="display:block;cursor:pointer">📷 Take Photo / Choose Image</span>
        <input type="file" accept="image/*" capture="environment" onchange="handleScanFile(this)" style="display:none">
      </label>
      <button class="btn btn-ghost" onclick="closeScan()">Cancel</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

<!-- Hidden share card for rendering -->
<div id="share-card" style="position:absolute;left:-9999px;top:-9999px;width:380px;background:#091510;padding:24px;font-family:Outfit,sans-serif;color:#ede8d8"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
